services:
  api:
    build: ./backend/services/api-service
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      
      - FLASK_ENV=development

  device:
    build: ./backend/services/device-service
    ports:
      - "5001:5001"
